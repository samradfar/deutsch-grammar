<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e40af">
<title>صفحه پیدا نشد — Deutsch Grammatik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root { --blue:#1e40af; --blue2:#2563eb; --fn:'Vazirmatn',Tahoma,sans-serif; --fm:'JetBrains Mono',monospace; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fn);background:#f7f8fc;color:#374151;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid #e4e8f0;border-radius:20px;padding:40px 32px;text-align:center;max-width:400px;width:100%}
.code{font-family:var(--fm);font-size:56px;font-weight:700;color:var(--blue);margin-bottom:8px}
.title{font-size:20px;font-weight:600;margin-bottom:10px}
.desc{font-size:14px;color:#6b7280;margin-bottom:28px;line-height:1.8}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:white;padding:11px 24px;border-radius:40px;text-decoration:none;font-size:14px;font-weight:600;transition:background .15s}
.btn:hover{background:var(--blue2)}
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <div class="title">صفحه پیدا نشد</div>
  <div class="desc">صفحه‌ای که دنبالش بودی وجود ندارد یا جابجا شده.</div>
  <a class="btn" href="./index.html">← برگشت به خانه</a>
</div>
</body>
</html>
